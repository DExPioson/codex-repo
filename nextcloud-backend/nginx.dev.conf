server {
    listen 80;
    server_name _;

    # -- CORS -----------------------------------------------------------------
    set $cors_origin "";
    if ($http_origin ~* "^http://localhost(:[0-9]+)?$") {
        set $cors_origin $http_origin;
    }

    error_page 418 = @cors_preflight;
    location @cors_preflight {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods'
            'GET, POST, PUT, PATCH, DELETE, OPTIONS, PROPFIND, PROPPATCH, MKCOL, COPY, MOVE, LOCK, UNLOCK'
            always;
        add_header 'Access-Control-Allow-Headers'
            'Authorization, Content-Type, Depth, Destination, Overwrite, OCS-APIRequest, requesttoken, X-Requested-With, Accept, Origin'
            always;
        add_header 'Access-Control-Expose-Headers'
            'DAV, ETag, Content-Length, Content-Type, Last-Modified, Location'
            always;
        add_header 'Access-Control-Max-Age' 86400 always;
        add_header 'Content-Length' 0;
        return 204;
    }

    location / {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods'
            'GET, POST, PUT, PATCH, DELETE, OPTIONS, PROPFIND, PROPPATCH, MKCOL, COPY, MOVE, LOCK, UNLOCK'
            always;
        add_header 'Access-Control-Allow-Headers'
            'Authorization, Content-Type, Depth, Destination, Overwrite, OCS-APIRequest, requesttoken, X-Requested-With, Accept, Origin'
            always;
        add_header 'Access-Control-Expose-Headers'
            'DAV, ETag, Content-Length, Content-Type, Last-Modified, Location'
            always;

        if ($request_method = OPTIONS) { return 418; }

        proxy_pass http://nextcloud:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        return 302 http://localhost:3000;
    }
}
