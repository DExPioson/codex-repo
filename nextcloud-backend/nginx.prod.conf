server {
    listen 443 ssl http2;
    server_name your-nextcloud-domain.com;

    ssl_certificate /etc/letsencrypt/live/your-nextcloud-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-nextcloud-domain.com/privkey.pem;

    client_max_body_size 10G;

    # -- CORS -----------------------------------------------------------------
    set $cors_origin "";
    if ($http_origin ~* "^https://drive\.icingtree\.com$") {
        set $cors_origin $http_origin;
    }

    error_page 418 = @cors_preflight;
    location @cors_preflight {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods'
            'GET, POST, PUT, PATCH, DELETE, OPTIONS, PROPFIND, PROPPATCH, MKCOL, COPY, MOVE, LOCK, UNLOCK'
            always;
        add_header 'Access-Control-Allow-Headers'
            'Authorization, Content-Type, Depth, Destination, Overwrite, OCS-APIRequest, requesttoken, X-Requested-With, Accept, Origin'
            always;
        add_header 'Access-Control-Expose-Headers'
            'DAV, ETag, Content-Length, Content-Type, Last-Modified, Location'
            always;
        add_header 'Access-Control-Max-Age' 86400 always;
        add_header 'Content-Length' 0;
        return 204;
    }

    location ~ ^/(remote\.php|ocs|status\.php|cron\.php) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods'
            'GET, POST, PUT, PATCH, DELETE, OPTIONS, PROPFIND, PROPPATCH, MKCOL, COPY, MOVE, LOCK, UNLOCK'
            always;
        add_header 'Access-Control-Allow-Headers'
            'Authorization, Content-Type, Depth, Destination, Overwrite, OCS-APIRequest, requesttoken, X-Requested-With, Accept, Origin'
            always;
        add_header 'Access-Control-Expose-Headers'
            'DAV, ETag, Content-Length, Content-Type, Last-Modified, Location'
            always;

        if ($request_method = OPTIONS) { return 418; }

        proxy_pass http://nextcloud:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/index\.php/(login|logout|apps/.*/api) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods'
            'GET, POST, PUT, PATCH, DELETE, OPTIONS, PROPFIND, PROPPATCH, MKCOL, COPY, MOVE, LOCK, UNLOCK'
            always;
        add_header 'Access-Control-Allow-Headers'
            'Authorization, Content-Type, Depth, Destination, Overwrite, OCS-APIRequest, requesttoken, X-Requested-With, Accept, Origin'
            always;
        add_header 'Access-Control-Expose-Headers'
            'DAV, ETag, Content-Length, Content-Type, Last-Modified, Location'
            always;

        if ($request_method = OPTIONS) { return 418; }

        proxy_pass http://nextcloud:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        return 302 https://drive.icingtree.com$request_uri;
    }
}
